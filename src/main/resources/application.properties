quarkus.http.port=8091
quarkus.package.jar.type=uber-jar
quarkus.package.jar.add-runner-suffix=false

# MCP Gateway registration (optional)
# Reads MCP_GATEWAY_URL env var automatically (set by service-portal).
# Override explicitly if needed:
# workflow-editor.gateway-url=http://localhost:8888
workflow-editor.gateway-url=${MCP_GATEWAY_URL:}
quarkus.http.host=0.0.0.0
quarkus.native.additional-build-args=--initialize-at-run-time=com.scivicslab.turingworkflow.workflow.Interpreter
workflow.params.base-dir=/home/devteam/works/workflow/environment-parameters
workflow.dir=/home/devteam/works/workflow

# Turing Workflow CLI jar path (used by batch job executor)
workflow.cli.jar=/home/devteam/works/Turing-workflow/target/turing-workflow-3.0.1.jar

# H2 in-memory datasource for batch job queue
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:batchjobs;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

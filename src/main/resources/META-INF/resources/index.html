<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Workflow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Turing Workflow</h1>
        <div class="header-controls">
            <label for="maxIterations" style="color:var(--text-secondary);font-size:12px;white-space:nowrap;">Max iter:</label>
            <input type="number" id="maxIterations" value="100" min="1" max="999999999" style="width:110px;">
            <label style="color:var(--text-secondary);font-size:12px;white-space:nowrap;cursor:pointer;"><input type="checkbox" id="infiniteCheck"> ∞</label>
            <label for="globalDelay" style="color:var(--text-secondary);font-size:12px;white-space:nowrap;">Delay(ms):</label>
            <input type="number" id="globalDelay" value="0" min="0" style="width:80px;">
            <button id="applyDelayBtn" class="btn btn-small">Apply</button>
            <button id="runBtn" class="btn btn-run">Run</button>
            <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
            <button id="resumeBtn" class="btn btn-resume" style="display:none">Resume</button>
            <select id="themeSelect">
                <option value="dark-catppuccin">Dark Catppuccin</option>
                <option value="dark-nord">Dark Nord</option>
                <option value="dark-blue">Dark Blue</option>
                <option value="dark-green">Dark Green</option>
                <option value="dark-red">Dark Red</option>
                <option value="light-clean">Light Clean</option>
                <option value="light-warm">Light Warm</option>
                <option value="light-blue">Light Blue</option>
                <option value="light-green">Light Green</option>
                <option value="light-red">Light Red</option>
            </select>
        </div>
    </header>
    <main>
        <section class="editor-section">
            <div class="tab-bar">
                <div id="tabList" class="tab-list"></div>
                <button id="addTabBtn" class="btn btn-small tab-add-btn" title="New workflow tab">+</button>
            </div>
            <div class="toolbar">
                <button id="addStepBtn" class="btn btn-small">+ Step</button>
                <button id="actorsBtn" class="btn btn-small">Actors</button>
                <button id="exportYamlBtn" class="btn btn-small">Export YAML</button>
                <button id="importYamlBtn" class="btn btn-small">Import YAML</button>
            </div>
            <div class="description-section">
                <textarea id="workflowDescription" placeholder="Workflow description (optional)" rows="1"></textarea>
            </div>
            <div class="table-wrapper">
                <div id="stepsContainer"></div>
            </div>
        </section>
        <div id="logResizer" class="log-resizer"></div>
        <section class="log-section">
            <div class="log-header">
                <span>Execution Log</span>
                <div class="log-header-controls">
                    <select id="logLevelSelect">
                        <option value="OFF" selected>OFF</option>
                        <option value="SEVERE">SEVERE</option>
                        <option value="WARNING">WARNING</option>
                        <option value="INFO">INFO</option>
                        <option value="FINE">FINE</option>
                        <option value="FINER">FINER</option>
                        <option value="FINEST">FINEST</option>
                        <option value="ALL">ALL</option>
                    </select>
                    <button id="clearLogBtn" class="btn btn-small">Clear</button>
                </div>
            </div>
            <div id="logOutput" class="log-output"></div>
        </section>
    </main>
    <div id="actorPanel" class="actor-panel" style="display:none;">
        <div class="actor-panel-header">
            <span>Registered Actors</span>
            <button id="actorPanelClose" class="btn btn-small">&times;</button>
        </div>
        <div id="actorPanelBody" class="actor-panel-body"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
